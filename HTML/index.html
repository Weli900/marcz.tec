<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcztec • Links</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Inter', sans-serif;
}

body{
background:#f4f7fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{

width:100%;
max-width:420px;
background:white;
border-radius:35px;
padding:35px 25px;

box-shadow:
0 15px 30px rgba(0,0,0,0.08);

border:1px solid #e6eef5;

}

/* LOGO */

.logo-container{
display:flex;
justify-content:center;
margin-bottom:20px;
}

.logo-img{
max-width:170px;
height:auto;
}

/* separador */

.divider{
height:1px;
background:#e6eef5;
margin:20px 0 25px 0;
}

/* INFO ENTREGA */

.info-location{

display:flex;
justify-content:center;

}

.sublime{

display:flex;
align-items:center;
gap:10px;

padding:10px 24px;

border-radius:60px;

border:1px solid #1f4ed8;

background:#f0f6ff;

font-size:1.05rem;
font-weight:500;

color:#1f4ed8;

}

.sublime i{
font-size:1.2rem;
}

/* BOTÕES */

.links-container{

display:flex;
flex-direction:column;
gap:16px;
margin-top:30px;

}

.btn-link{

display:flex;
align-items:center;
justify-content:center;

gap:14px;

padding:16px 20px;

border-radius:100px;

text-decoration:none;

font-weight:600;
font-size:1.2rem;

border:2px solid;

background:white;

transition:all .2s ease;

box-shadow:0 4px 10px rgba(0,0,0,0.08);

}

.btn-link i{
font-size:1.8rem;
}

/* WHATSAPP */

.btn-whatsapp{

border-color:#25D366;
color:#075e54;

}

.btn-whatsapp i{
color:#25D366;
}

/* YOUTUBE */

.btn-youtube{

border-color:#ff4d4d;
color:#cc0000;

}

.btn-youtube i{
color:#ff4d4d;
}

/* TIKTOK */

.btn-tiktok{

border-color:#1f4ed8;
color:#1f4ed8;

}

.btn-tiktok i{
color:#1f4ed8;
}

/* HOVER */

.btn-link:hover{

transform:translateY(-3px);

box-shadow:0 10px 18px rgba(0,0,0,0.15);

}

/* RODAPÉ */

.footer{

text-align:center;

margin-top:35px;

font-size:0.85rem;

color:#6b7280;

border-top:1px dashed #d7e0ea;

padding-top:18px;

}

.footer i{
color:#1f4ed8;
}

</style>
</head>

<body>

<div class="card">

<div class="logo-container">
<img src="/img/logo.webp" class="logo-img">
</div>

<div class="divider"></div>

<div class="info-location">
<div class="sublime">
<i class="fas fa-motorcycle"></i> Busca e entrega
</div>
</div>

<div class="links-container">

<a href="https://wa.me/5541995671444?text=Olá, vim pelo site da Marcztec!" 
class="btn-link btn-whatsapp" target="_blank">

<i class="fab fa-whatsapp"></i>
Fale direto no WhatsApp

</a>

<a href="https://youtube.com/@marcz_tec" 
class="btn-link btn-youtube" target="_blank">

<i class="fab fa-youtube"></i>
YouTube /marcz.tec

</a>

<a href="https://www.tiktok.com/@marcztec" 
class="btn-link btn-tiktok" target="_blank">

<i class="fab fa-tiktok"></i>
TikTok @marcztec

</a>

</div>

<div class="footer">

<i class="fas fa-bolt"></i> tecnologia e conectividade <i class="fas fa-bolt"></i>
<br><br>
✧ Curitiba & região ✧

</div>

</div>

</body>
</html>
